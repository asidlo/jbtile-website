  <path fill="#C9D5E0" d="M 48.0,16.5 L 41,23 L 55,23 Z"/>
  <path fill="#C9D5E0" d="M 48.0,79.5 L 41,73 L 55,73 Z"/>
  <path fill="#C9D5E0" d="M 16.5,48.0 L 23,41 L 23,55 Z"/>
  <path fill="#C9D5E0" d="M 79.5,48.0 L 73,41 L 73,55 Z"/>
  <!-- quartering cross -->
  <path stroke="#9aa6b2" stroke-width="0.8"
        d="M 48.0,16.5 L 48.0,79.5 M 16.5,48.0 L 79.5,48.0"/>
  <!-- navy compass center -->
  <path fill="#2f4d6e" d="M 48.0,41 L 55,48.0 L 48.0,55 L 41,48.0 Z"/>
  <path stroke="#ffffff" stroke-width="0.9" d="M 48.0,42.5 L 48.0,53.5 M 42.5,48.0 L 53.5,48.0"/>
  <circle cx="48.0" cy="48.0" r="1.5" fill="#ffffff"/>
</g>
