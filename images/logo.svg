<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 322 100" role="img" aria-label="JB Tile, LLC">
  <defs>
    <linearGradient id="goldgrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E0BE78"/>
      <stop offset="0.5" stop-color="#C79A4B"/>
      <stop offset="1" stop-color="#A87C33"/>
